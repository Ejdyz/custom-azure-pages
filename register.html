<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Journey Guide Register</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <style>
        /* ─── Base ──────────────────────────────────────────────────── */

        * {
            font-family: Montserrat, sans-serif;
        }

        body {
            margin: 0 !important;
            padding: 20px;
            min-height: 100dvh;
            box-sizing: border-box;
            background-color: #EEEEFC;
            display: flex;
            gap: 24px;
        }

        p {
            margin: 0 2px;
        }

        /* ─── Layout ─────────────────────────────────────────────────── */

        .hide-below-1250 {
            display: flex;
        }

        @media (max-width: 1250px) {
            .hide-below-1250 {
                display: none !important;
            }
        }

        /* ─── Form elements ──────────────────────────────────────────── */

        input {
            margin-top: 5px;
            height: 36px;
            border-radius: 10px;
            width: calc(100% - 15px) !important;
            border: 1px solid #D4D4D8;
            padding-left: 15px !important;
        }

        button {
            width: 100% !important;
            margin-top: 24px;
            padding: 8px 16px !important;
            border: 0 !important;
            border-radius: 10px;
            background: #5B21B6 !important;
            color: #FAFAFA;
            font-size: 14px;
            display: flex;
            justify-content: center !important;
            align-items: center !important;
            text-align: center !important;
            box-shadow: var(--shadow-xs-offset-x, 0) var(--shadow-xs-offset-y, 1px) var(--shadow-xs-blur-radius, 2px) var(--shadow-xs-spread-radius, 0) var(--shadow-xs-color, rgba(0, 0, 0, 0.05));
        }

        button:hover {
            background: #4d1c9b !important;
            cursor: pointer;
        }

        /* ─── Azure B2C injected elements ────────────────────────────── */

        /* Elements Azure renders that are not needed in this layout */
        .heading,
        .intro,
        .divider {
            display: none;
        }

        .buttons #cancel {
            display: none;
        }

        /* Azure wraps each field in .entry > .entry-item */
        .entry label {
            margin-top: 16px !important;
        }

        .entry-item {
            display: flex;
            flex-direction: column;
        }

        /* Azure renders the password label as a wrapper <span> */
        .password-label {
            display: contents;
        }

        .error {
            color: #EF4444;
        }

        /* Azure injects the entire form into #api */
        #api {
            padding: 10px;
            padding-top: 0 !important;
            overflow-y: auto;
            max-height: 65dvh;
        }

        /* Azure email verification section */
        #emailVerificationControl ul {
            padding-left: 0 !important;
        }

        ul {
            padding-left: 0 !important;
            list-style-type: none;
        }

        li {
            margin-top: 15px;
        }

        .VerificationCode {
            margin-top: 15px;
        }

        /* Azure renders help text links below fields; shown on focus */
        a {
            font-size: 14px;
            color: #71717A;
            order: 2;
            margin-top: 5px;
        }

        .helpLink {
            display: none;
        }

        input:focus ~ .helpLink {
            display: block;
        }
    </style>
</head>
