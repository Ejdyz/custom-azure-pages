<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Journey Guide Login</title>
    <link rel="icon" href="https://cjgv2storage.blob.core.windows.net/pages/logo.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <style>
        /* ─── Base ──────────────────────────────────────────────────── */

        * {
            font-family: Montserrat, sans-serif;
        }

        body {
            margin: 0 !important;
            padding: 0;
            height: 100dvh;
            background-color: #EEEEFC;
            display: flex;
            gap: 24px;
        }

        p {
            margin: 0 2px;
        }

        /* ─── Layout ─────────────────────────────────────────────────── */

        .hide-below-1250 {
            display: flex;
        }

        @media (max-width: 1250px) {
            .hide-below-1250 {
                display: none !important;
            }
        }

        /* ─── Form elements ──────────────────────────────────────────── */

        input {
            margin-top: 5px;
            height: 36px;
            border-radius: 10px;
            width: calc(100% - 19px) !important;
            border: 1px solid #D4D4D8;
            padding-left: 15px !important;
        }

        button {
            width: 100% !important;
            margin-top: 24px;
            padding: 8px 16px !important;
            border: 0 !important;
            border-radius: 10px;
            background: #5B21B6 !important;
            color: #FAFAFA;
            font-size: 14px;
            display: flex;
            justify-content: center !important;
            align-items: center !important;
            text-align: center !important;
            box-shadow: var(--shadow-xs-offset-x, 0) var(--shadow-xs-offset-y, 1px) var(--shadow-xs-blur-radius, 2px) var(--shadow-xs-spread-radius, 0) var(--shadow-xs-color, rgba(0, 0, 0, 0.05));
        }

        button:hover {
            background: #4d1c9b !important;
            cursor: pointer;
        }

        /* ─── Azure B2C injected elements ────────────────────────────── */

        /* Elements Azure renders that are not needed in this layout */
        .heading,
        .intro,
        .divider {
            display: none;
        }

        .buttons #cancel {
            display: none;
        }

        /* Azure wraps each field in .entry > .entry-item */
        .entry label {
            margin-top: 16px !important;
        }

        .entry-item {
            display: flex;
            flex-direction: column;
        }

        /* Azure renders the password label as a wrapper <span> */
        .password-label {
            display: contents;
        }

        #forgotPassword {
            font-size: 14px;
            color: #71717A;
            order: 2;
            margin-top: 5px;
        }

        .error {
            color: #EF4444;
        }

        /* Azure injects the entire form into #api */
        #api {
            padding: 0 !important;
            overflow-y: auto;
            max-height: 60dvh;
        }
    </style>
</head>

<body>
    <!-- Login form panel -->
    <div style="width: 100%; display: flex; justify-content: center; align-items: center;">
        <div style="max-width: 360px; border: #D4D4D8 1px solid; border-radius: 16px; background-color: white; padding: 24px;">
            <img src="https://cjgv2storage.blob.core.windows.net/pages/logo.svg" alt="Customer Journey Guide logo" width="36" height="36" />
            <h1 style="font-size: 30px; font-weight: 700; color: #09090B; margin-bottom: 12px;">Login</h1>
            <p style="font-size: 14px; font-weight: 400; color: #71717A; margin-bottom: 15px;">
                Log in using your email address and password, or reset your password if necessary.
            </p>
            <!-- Azure B2C injects the form content here -->
            <div id="api"></div>
        </div>
    </div>

    <!-- Decorative image panel (hidden below 1250px) -->
    <div class="hide-below-1250" style="width: 100%; display: flex; justify-content: center; align-items: center;">
        <img style="border-radius: 16px; object-position: 68% 50%; object-fit: cover; width: 80%; height: 90%;"
            src="https://cjgv2storage.blob.core.windows.net/pages/image.jpg" alt="Welcome image" />
    </div>
</body>

</html>
